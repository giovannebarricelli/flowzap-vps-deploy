<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FlowZap | Luxury Intelligence</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Montserrat:wght@300;400;600;700&display=swap');

        :root {
            --bg-purple: #0a0514;
            --card-purple: #140a24;
            --gold-gradient: linear-gradient(145deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            --gold-soft: #d4af37;
            --danger: #ff4757;
            --warning: #ffa502;
            --success: #2ecc71;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        body {
            background-color: var(--bg-purple);
            background-image: radial-gradient(circle at center, #1c0f2e 0%, var(--royal-purple) 100%);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; color: #fff; padding: 20px; overflow: hidden;
        }

        .container { width: 100%; max-width: 500px; transition: transform 0.4s ease; z-index: 1; }
        .container.shifted { transform: translateX(-180px); }

        .card {
            background: var(--card-purple); border-radius: 30px; padding: 40px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(212, 175, 55, 0.15); text-align: center;
        }

        .brand-name { font-family: 'Playfair Display', serif; font-size: 42px; font-weight: 700; background: var(--gold-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 5px; }
        .brand-sub { font-size: 10px; font-weight: 600; letter-spacing: 5px; color: var(--gold-soft); text-transform: uppercase; margin-bottom: 35px; opacity: 0.7; }

        .form { display: flex; flex-direction: column; gap: 15px; text-align: left; }
        label { font-size: 10px; font-weight: 700; color: var(--gold-soft); text-transform: uppercase; letter-spacing: 1.5px; }

        input, textarea, select {
            background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(212, 175, 55, 0.15);
            border-radius: 12px; padding: 14px; color: #fff; font-size: 14px; width: 100%; outline: none;
        }

        button { padding: 18px; border: none; border-radius: 12px; font-weight: 800; font-size: 13px; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; transition: 0.4s; }
        
        .btn-gold { background: var(--gold-gradient); color: #0a0514; width: 100%; margin-top: 10px; }
        .btn-pause { background: transparent; border: 2px solid var(--warning); color: var(--warning); flex: 1; }
        .btn-cancel { background: transparent; border: 2px solid var(--danger); color: var(--danger); flex: 1; }

        .controls-row { display: flex; gap: 10px; margin-top: 10px; }
        .hidden { display: none !important; }

        .log-panel {
            position: fixed; top: 0; right: -400px; width: 380px; height: 100vh;
            background: #0d061a; border-left: 1px solid rgba(212, 175, 55, 0.2);
            padding: 30px 20px; transition: 0.4s; z-index: 100;
        }
        .log-panel.open { right: 0; }
        #logContent { height: 80vh; overflow-y: auto; font-size: 11px; margin-top: 20px; }
        .log-success { color: var(--success); margin-bottom: 5px; }
        .log-error { color: var(--danger); margin-bottom: 5px; }
        
        .message { margin-top: 20px; font-size: 12px; color: var(--gold-soft); font-style: italic; text-align: center; }
    </style>
</head>
<body>
    <main id="container" class="container">
        <section class="card">
            <div class="brand-name">FlowZap</div>
            <div class="brand-sub">Exclusive Intelligence</div>

            <div id="authArea">
                <form id="codeForm" class="form">
                    <label>Digite aqui sua instância</label>
                    <input id="codeInput" type="text" placeholder="NOME DA INSTÂNCIA" required />
                    <button type="submit" class="btn-gold">Autenticar Sistema</button>
                </form>
            </div>

            <div id="panelArea" class="hidden">
                <div class="form">
                    <label>Contatos</label>
                    <textarea id="phoneList" rows="3" placeholder="5511..."></textarea>
                    
                    <div style="display: flex; gap: 10px;">
                        <textarea id="msgA" rows="2" placeholder="Mensagem Alpha" style="flex:1"></textarea>
                        <textarea id="msgB" rows="2" placeholder="Mensagem Beta" style="flex:1"></textarea>
                    </div>

                    <div style="display: flex; gap: 10px;">
                        <div style="flex:1">
                            <label>Duração (Mín 2.5)</label>
                            <input type="number" id="totalDuration" value="2.5" step="0.5">
                        </div>
                        <div style="flex:1">
                            <label>Descanso</label>
                            <select id="restTime">
                                <option value="5">5 Minutos</option>
                                <option value="10">10 Minutos</option>
                                <option value="15">15 Minutos</option>
                            </select>
                        </div>
                    </div>

                    <button id="btnStart" class="btn-gold">Iniciar Operação</button>
                    
                    <div id="controlsRow" class="controls-row hidden">
                        <button id="btnPause" class="btn-pause">Pausar</button>
                        <button id="btnCancel" class="btn-cancel">Cancelar</button>
                    </div>

                    <button id="toggleLogs" style="background:none; color:var(--gold-soft); font-size:10px; border:1px solid #333; margin-top:15px;">Ver Logs em Tempo Real</button>
                    <button id="btnLogout" style="background:none; border:none; color:#444; font-size:9px; margin-top:10px;">Desconectar Instância</button>
                </div>
            </div>
            <p id="message" class="message"></p>
        </section>
    </main>

    <aside id="logPanel" class="log-panel">
        <h3 style="color:var(--gold-soft); font-family:'Playfair Display'">Logs de Disparo</h3>
        <div id="logContent"></div>
        <button id="closeLogs" style="margin-top:20px; width:100%; background:#222; color:#fff; padding:10px;">Fechar</button>
    </aside>

    <script src="./js/app.js"></script>
</body>
</html>
